installed:
- agent-context
- bugfix
- doctor
- git
- lifecycle
- refine
- review
- switch
- sync
- verify
- verify-tasks
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: false
    priority: 10
    prompt: Check artifact sync status after specification?
    description: Show sync status after spec generation
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    priority: 10
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: false
    priority: 10
    prompt: Check artifact sync status after planning?
    description: Show sync status after plan generation
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    priority: 10
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: lifecycle
    command: speckit.lifecycle.check
    enabled: true
    optional: false
    priority: 100
    prompt: Checking lifecycle phase...
    description: Block specify if spec is locked
    condition: null
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: lifecycle
    command: speckit.lifecycle.check
    enabled: true
    optional: false
    priority: 100
    prompt: Checking lifecycle phase...
    description: Block clarify if spec is locked
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    priority: 10
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: lifecycle
    command: speckit.lifecycle.check
    enabled: true
    optional: false
    priority: 100
    prompt: Checking lifecycle phase...
    description: Block plan if spec is locked
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    priority: 10
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_tasks:
